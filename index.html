<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Interactive rating component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <!-- <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <img class="starimg" src="images/icon-star.svg" alt="startimage">
    </header>
    <main>
      <section class="context">
        <h1> How did we do?</h1>
        <p>Please let us know how we did with your support request. All feedback is appreciated to help us improve our
          offering!</p>
      </section>
      <section class="buttons">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
      </section>
    </main>
    <button id="sub-btn">SUBMIT</button>
    <div id="thank-you" class="thanks">
      <img class="tq" src="images/illustration-thank-you.svg" alt="mobile design saying thank you">
      <p id="selected"></p>
      <h2>Thank You !</h2>
      <p> We appreciate you taking the time to give a rating. If you ever need more support,
      don't hesitate to get in touch!</p>
    </div>
  </div>
  <!-- Rating state end -->

  <!-- Thank you state start -->
  <!-- 
  You selected Add rating here out of 5

  Thank you!

  We appreciate you taking the time to give a rating. If you ever need more support,
  don’t hesitate to get in touch!

  <!-- Thank you state end -->

</body>

</html>
